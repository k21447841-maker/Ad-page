<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Ad</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Watch Ad</h1>
        <p id="status">Loading ad...</p>
        
        <!-- Your Ad Script -->
        <script src="https://pl28854886.effectivegatecpm.com/34/7d/c9/347dc9e560d21cd1af1bb2a05b3f3316.js"></script>
        
        <button class="btn" onclick="verify()">✅ I Watched Ad</button>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        function verify() {
            tg.sendData(JSON.stringify({
                viewed: true,
                time: Date.now()
            }));
            document.getElementById('status').innerHTML = '✅ Points Added! Close this window.';
        }
        
        setTimeout(() => {
            document.getElementById('status').innerHTML = '✅ Ad ready! Click button.';
        }, 3000);
    </script>
</body>
</html>
