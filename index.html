<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnX - Watch Ads & Earn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; font-size: 40px; margin-bottom: 10px; }
        .balance {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
        }
        .points {
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
        }
        .inr {
            font-size: 24px;
            opacity: 0.9;
        }
        .btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 20px;
            font-size: 20px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin: 10px 0;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.02);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 EarnX</h1>
        <p style="text-align: center;">Watch Ads & Earn Money</p>
        
        <div class="balance">
            <div class="points" id="points">0</div>
            <div class="inr" id="inr">₹0.00</div>
        </div>
        
        <button class="btn" onclick="watchAd()">
            📺 Watch Ad & Earn 10 Points
        </button>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="todayAds">0</div>
                <div>Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalAds">0</div>
                <div>Total</div>
            </div>
        </div>
        
        <div class="footer">
            <p>🎁 Daily Login Bonus: +10 Points</p>
            <p>💎 1000 Points = ₹10 (Coming Soon)</p>
            <p>👥 Refer & Earn: 10% Commission</p>
        </div>
    </div>
    
    <script>
        // Your Adsterra Smartlink
        const ADSTERRA_URL = "https://www.effectivegatecpm.com/ebfsrhtwn3?key=641705b4c31d6dae463a86bf896e7792";
        const POINTS_PER_AD = 10;
        
        // Load user data
        let userData = JSON.parse(localStorage.getItem('earnxData')) || {
            points: 0,
            todayAds: 0,
            totalAds: 0,
            lastLogin: null,
            referrals: 0,
            lastAdTime: null
        };
        
        // Check daily login bonus
        const today = new Date().toDateString();
        if (userData.lastLogin !== today) {
            userData.points += 10;
            userData.lastLogin = today;
            showNotification('🎁 Daily Bonus: +10 points!');
        }
        
        function updateUI() {
            document.getElementById('points').textContent = userData.points;
            document.getElementById('todayAds').textContent = userData.todayAds;
            document.getElementById('totalAds').textContent = userData.totalAds;
            
            const inrValue = (userData.points / 100).toFixed(2);
            document.getElementById('inr').textContent = `₹${inrValue}`;
            
            localStorage.setItem('earnxData', JSON.stringify(userData));
        }
        
        function watchAd() {
            // Open Adsterra link
            window.open(ADSTERRA_URL, '_blank');
            
            // Simulate ad watch (5 seconds)
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '⏳ Watching ad...';
            btn.disabled = true;
            
            setTimeout(() => {
                // Add points
                userData.points += POINTS_PER_AD;
                userData.todayAds += 1;
                userData.totalAds += 1;
                userData.lastAdTime = new Date().toISOString();
                
                updateUI();
                
                btn.textContent = originalText;
                btn.disabled = false;
                
                showNotification(`✅ +${POINTS_PER_AD} points earned!`);
            }, 5000);
        }
        
        function showNotification(message) {
            // Create notification element
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #4CAF50;
                color: white;
                padding: 15px 30px;
                border-radius: 50px;
                font-size: 16px;
                z-index: 1000;
                animation: slideUp 0.3s;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Copy referral link
        function copyReferral() {
            const link = `https://t.me/share/url?url=${window.location.href}?ref=${userData.totalAds}`;
            navigator.clipboard.writeText(link);
            showNotification('✅ Referral link copied!');
        }
        
        // Initialize
        updateUI();
    </script>
</body>
</html>
